<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Boon Tree Supermarket Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#f4f7fb;
font-family:Segoe UI;
}

.header{
background:linear-gradient(90deg,#1e3c72,#2a5298);
color:white;
padding:20px;
font-size:26px;
font-weight:bold;
text-align:center;
}

.card{
border-radius:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.kpi{
font-size:32px;
font-weight:bold;
color:#1e3c72;
}

.chart-container{
height:350px;
}

</style>

</head>

<body>

<div class="header">
Boon Tree Supermarket Sales Dashboard
</div>

<div class="container mt-4">

<div class="row g-3">

<div class="col-md-4">
<div class="card p-3">
<div>Today's Sales</div>
<div class="kpi">฿182,450</div>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<div>Total Bills</div>
<div class="kpi">1,254</div>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<div>Avg / Bill</div>
<div class="kpi">฿145</div>
</div>
</div>

</div>


<div class="row mt-4 g-4">

<div class="col-lg-8">

<div class="card p-4">

<h5>Monthly Sales</h5>

<div class="chart-container">
<canvas id="salesChart"></canvas>
</div>

</div>

</div>


<div class="col-lg-4">

<div class="card p-4">

<h5>Top Categories</h5>

<div class="chart-container">
<canvas id="categoryChart"></canvas>
</div>

</div>

</div>

</div>


</div>

<script>

const salesChart = new Chart(
document.getElementById('salesChart'),
{
type:'line',

data:{

labels:[
'Jan','Feb','Mar','Apr','May','Jun',
'Jul','Aug','Sep','Oct','Nov','Dec'
],

datasets:[{
label:'Sales',

data:[
350000,
420000,
390000,
450000,
520000,
480000,
510000,
530000,
500000,
560000,
590000,
610000
],

borderColor:'#1e3c72',
backgroundColor:'rgba(30,60,114,0.1)',
fill:true,
tension:0.4

}]
},

options:{
responsive:true
}

}
)


const categoryChart = new Chart(
document.getElementById('categoryChart'),
{

type:'doughnut',

data:{

labels:[
'Fresh Food',
'Beverage',
'Snack',
'Household',
'Other'
],

datasets:[{

data:[
35,
25,
20,
10,
10
],

backgroundColor:[
'#1e3c72',
'#2a5298',
'#4facfe',
'#00c6ff',
'#a1c4fd'
]

}]

}

}

)

</script>

</body>
</html>
