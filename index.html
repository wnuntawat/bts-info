<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Loss Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans">

    <div class="container mx-auto px-4 py-6">
        <div class="flex justify-between items-center mb-8 border-b border-slate-700 pb-5">
            <div>
                <h1 class="text-2xl font-bold text-cyan-400">🏭 Production Loss Analytics</h1>
                <p class="text-slate-400 text-sm">Real-time data from Factory Google Sheets</p>
            </div>
            <div class="text-right">
                <span class="bg-green-500/20 text-green-400 text-xs font-bold px-3 py-1 rounded-full border border-green-500/30">SYSTEM ONLINE</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-slate-800/50 p-5 rounded-2xl border border-slate-700 shadow-xl">
                <h3 class="text-slate-400 text-xs uppercase tracking-wider mb-2">Total Loss (Qty)</h3>
                <p id="kpi-total" class="text-3xl font-black text-red-500">---</p>
            </div>
            <div class="bg-slate-800/50 p-5 rounded-2xl border border-slate-700 shadow-xl">
                <h3 class="text-slate-400 text-xs uppercase tracking-wider mb-2">Avg Loss / Mo</h3>
                <p id="kpi-avg" class="text-3xl font-black text-orange-400">---</p>
            </div>
            <div class="bg-slate-800/50 p-5 rounded-2xl border border-slate-700 shadow-xl">
                <h3 class="text-slate-400 text-xs uppercase tracking-wider mb-2">Max Loss Month</h3>
                <p id="kpi-max" class="text-xl font-bold text-yellow-400">---</p>
            </div>
            <div class="bg-slate-800/50 p-5 rounded-2xl border border-slate-700 shadow-xl text-center">
                <h3 class="text-slate-400 text-xs uppercase tracking-wider mb-2">Data Points</h3>
                <p id="kpi-count" class="text-3xl font-black text-cyan-400">0</p>
            </div>
        </div>

        <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700 shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-bold text-slate-300">Loss Quantity Trend (2025-2026)</h3>
                <div class="flex gap-2">
                    <span class="flex items-center text-xs text-slate-400"><span class="w-3 h-3 bg-red-500 rounded-full mr-2"></span>Loss Qty</span>
                </div>
            </div>
            <div class="h-[450px]">
                <canvas id="lossChart"></canvas>
            </div>
        </div>
    </div>
<div class="bg-slate-800/80 p-6 rounded-2xl border border-cyan-500/30 shadow-2xl mt-8">
    <h3 class="text-cyan-400 font-bold mb-3 flex items-center">
        <span class="mr-2">✨</span> AI Analysis & Recommendation
    </h3>
    <div id="ai-insight" class="text-slate-300 text-sm leading-relaxed">
        กำลังวิเคราะห์ข้อมูลด้วย AI...
    </div>
</div>
    <script src="script.js"></script>
</body>
</html>
